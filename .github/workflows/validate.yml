name: Validate Protocol Examples

on:
  push:
    branches:
      - main
      - master
    paths:
      - "schemas/**"
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/validate.yml"

  pull_request:
    paths:
      - "schemas/**"
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/validate.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate on Python ${{ matrix.python-version }}

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install validation dependencies
        run: |
          python -m pip install \
            "jsonschema[format]>=4.20,<5" \
            "PyYAML>=6,<7"

      - name: Compile validation script
        run: |
          python -m py_compile scripts/validate_examples.py

      - name: Validate protocol examples
        run: |
          python scripts/validate_examples.py
